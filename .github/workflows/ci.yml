name: CI

# Run on every PR and on pushes to main so the coverage gate, lint, and
# type-check defined in vitest.config.ts are actually enforced (see issue:
# thresholds existed but nothing in .github/ ran `vitest run --coverage`).
on:
  pull_request:
  push:
    branches: [main]

# Cancel any in-progress run for the same ref when a new commit is pushed,
# so rapid pushes don't pile up and queue redundant installs/builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: this workflow only reads repo contents.
# Elevate per-job if a future step needs more (e.g. PR comments).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Pinned to a commit SHA (not a mutable tag) per security guidance.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # setup-node's built-in `cache: npm` keys the cache on package-lock.json
      # automatically, satisfying the "cache keyed on lockfile hash" requirement
      # without a separate actions/cache step.
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      # vitest.config.ts defines coverage.thresholds (95% lines/functions/
      # branches/statements). `vitest run` (invoked via `npm run test`) fails
      # the process — and therefore this step — if any threshold is not met.
      - name: Test with coverage gate
        run: npm run test

      # Persist the coverage report (html + json + text, per the reporter
      # list in vitest.config.ts) so reviewers can inspect results without
      # re-running the suite locally.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14