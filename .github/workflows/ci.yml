# CI pipeline: lint → type-check → build → Playwright E2E
# Runs on every pull_request and every push to main.
# Uses pull_request (not pull_request_target) so fork PRs never access secrets.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: jobs only need to read the repo contents.
permissions:
  contents: read

jobs:
  ci:
    name: Lint · Type-check · Build · E2E
    runs-on: ubuntu-latest

    # Node 20 LTS — matches @types/node ^20 declared in devDependencies.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # next lint exits non-zero on errors, acting as the lint gate.
      - name: Lint
        run: npm run lint

      # tsc --noEmit catches type errors independently of the build.
      - name: Type-check
        run: npx tsc --noEmit

      # Build with ESLint re-enabled (ignoreDuringBuilds is false in CI via env var).
      - name: Build
        run: npm run build
        env:
          # Overrides next.config.ts so build also enforces lint.
          NEXT_LINT_DURING_BUILDS: "1"

      # Install Chromium + system deps required by Playwright.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: npm run test:e2e

      # Retain the HTML report so failures can be inspected in the Actions UI.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
